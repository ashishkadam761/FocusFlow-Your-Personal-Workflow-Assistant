<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1>Focus Flow</h1>
        <h3>My Modern To-Do List</h3>

        <!-- Input + Add Button -->
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Add a new task">
            <button id="add-task"><i class="fas fa-plus"></i></button>
        </div>

        <!-- Controls: Clear All + Counter -->
        <div class="controls">
            <span id="task-counter">0 tasks</span>
            <button id="clear-all"><i class="fas fa-trash-alt"></i> Clear All</button>
        </div>

        <!-- Task List -->
        <ul id="task-list"></ul>
        <p id="no-tasks">No tasks yet. Add something!</p>
    </div>

    <!-- JS -->
    <script src="js/script.js"></script>
</body>
</html>
